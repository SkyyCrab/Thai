<style>

  body {

    background: #0f0f1a;
    color: #e0e0e0;
    line-height: 1.8;

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(15,15,26,0.95);
    backdrop-filter: blur(10px);

    padding: 0 20px;
    display: flex; align-items: center; gap: 8px;
    height: 52px;
    overflow-x: auto;
  }
  nav button {

    padding: 6px 14px; border-radius: 20px; cursor: pointer;

  nav button.active { background: #7c6ff7; border-color: #7c6ff7; color: #fff; }

  /* TABS */

  .tab-content.active { display: block; }

  }

    padding: 2px 4px;
    border-radius: 4px;
    cursor: pointer;

  }
  .thai-sentence .word:hover {

  }
  .thai-sentence .word.highlighted {

  }
  .thai-sentence .word.word-review {
    color: #e8c547;
    border-bottom: 1px dotted #e8c547;
  }
  .thai-sentence .word.word-review:hover {
    background: rgba(232,197,71,0.15);
  }
  .thai-sentence .word.word-review.highlighted {
    background: rgba(232,197,71,0.3);

  .vocab-list { margin-top: 12px; }
  .vocab-item {

    border-radius: 8px;
    font-size: 14px;

  .vocab-item .v-thai { font-size: 16px; font-weight: 600; color: #e8c547; }
  .vocab-item .v-roman { color: #7c9ff7; font-size: 13px; }
  .vocab-item .v-meaning { color: #ccc; }
  .vocab-item .v-english { color: #888; font-size: 13px; }
  .vocab-item .v-struct { color: #666; font-size: 12px; margin-top: 2px; }

  .vocab-toggle {
    display: inline-block;
    margin-top: 8px;
    font-size: 13px;
    color: #7c6ff7;
    cursor: pointer;
    user-select: none;
  }
  .vocab-toggle:hover { text-decoration: underline; }

  .vocab-list.collapsed { display: none; }

  /* === 例句 TAB === */
  .example-card {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 12px;
    cursor: pointer;

  .example-card .ex-word { font-size: 20px; color: #e8c547; font-weight: 600; }
  .example-card .ex-zh { font-size: 14px; color: #aaa; margin-left: 12px; }

    padding-top: 10px;
    border-top: 1px dashed #2a2a4a;
    display: none;
  }
  .example-card.open .ex-sentences { display: block; }
  .example-card .ex-thai { font-size: 17px; line-height: 2; margin-bottom: 4px; }
  .example-card .ex-cn { color: #8a8aaa; font-size: 14px; }

  /* === 近似字 TAB === */
  .similar-card {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: center;
  }
  .similar-card .sim-word { text-align: center; }
  .similar-card .sim-thai { font-size: 24px; color: #e8c547; font-weight: 600; }
  .similar-card .sim-roman { font-size: 13px; color: #7c9ff7; }
  .similar-card .sim-mean { font-size: 14px; color: #ccc; margin-top: 4px; }
  .similar-card .sim-vs { font-size: 18px; color: #7c6ff7; font-weight: 700; }
  .similar-card .sim-note {
    grid-column: 1 / -1;
    font-size: 13px; color: #888;
    background: rgba(124,111,247,0.08);
    padding: 8px 12px; border-radius: 6px;
    margin-top: 4px;
  }

  /* === 單字卡 TAB === */
  .flashcard-area {
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 0;
  }
  .flashcard {
    width: 100%; max-width: 480px;
    min-height: 300px;
    background: linear-gradient(145deg, #1e1e36, #1a1a2e);
    border: 2px solid #2a2a4a;
    border-radius: 20px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px;
    cursor: pointer;
    transition: transform 0.3s, border-color 0.3s;
    user-select: none;
    perspective: 1000px;
  }
  .flashcard:hover { border-color: #7c6ff7; transform: translateY(-2px); }
  .flashcard .fc-thai { font-size: 36px; color: #e8c547; font-weight: 700; }
  .flashcard .fc-roman { font-size: 16px; color: #7c9ff7; margin-top: 8px; }
  .flashcard .fc-answer {
    margin-top: 20px; text-align: center;
    opacity: 0; transition: opacity 0.3s;
  }
  .flashcard.revealed .fc-answer { opacity: 1; }
  .flashcard .fc-zh { font-size: 24px; color: #fff; }
  .flashcard .fc-en { font-size: 14px; color: #888; margin-top: 4px; }
  .flashcard .fc-struct { font-size: 13px; color: #666; margin-top: 8px; }
  .flashcard .fc-hint { font-size: 13px; color: #555; margin-top: 20px; }
  .flashcard.revealed .fc-hint { display: none; }

  .fc-controls {
    display: flex; gap: 12px; margin-top: 24px; align-items: center;
  }
  .fc-controls button {
    padding: 10px 28px; border-radius: 24px; border: none;
    font-size: 15px; cursor: pointer; transition: all 0.2s;
  }
  .fc-btn-prev, .fc-btn-next {
    background: #2a2a4a; color: #ccc;
  }
  .fc-btn-prev:hover, .fc-btn-next:hover { background: #7c6ff7; color: #fff; }
  .fc-btn-shuffle { background: none; border: 1px solid #3a3a5a !important; color: #888; font-size: 13px; padding: 8px 16px; }
  .fc-btn-shuffle:hover { border-color: #7c6ff7 !important; color: #fff; }
  .fc-progress { font-size: 14px; color: #555; }

  /* === 測驗 TAB === */
  .quiz-area { max-width: 600px; margin: 0 auto; padding: 20px 0; }
  .quiz-question {
    font-size: 32px; text-align: center;
    color: #e8c547; font-weight: 700;
    margin-bottom: 8px;
  }
  .quiz-roman { text-align: center; color: #7c9ff7; font-size: 15px; margin-bottom: 24px; }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-option {
    padding: 14px 20px;
    background: #1a1a2e;
    border: 2px solid #2a2a4a;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
    color: #ccc;

  .quiz-option.correct { border-color: #4caf50; background: rgba(76,175,80,0.15); color: #4caf50; }

    font-size: 15px; color: #888;

    display: block; margin: 20px auto;

    background: #7c6ff7; color: #fff; font-size: 15px;
    cursor: pointer; transition: background 0.2s;

  .word-tooltip {
    position: fixed;
    background: #252545;
    border: 1px solid #7c6ff7;
    border-radius: 10px;
    padding: 12px 16px;
    z-index: 200;
    min-width: 220px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: none;
    font-size: 14px;
  }

  .word-tooltip .tt-roman { color: #7c9ff7; font-size: 13px; }
  .word-tooltip .tt-zh { margin-top: 4px; color: #fff; }
  .word-tooltip .tt-en { color: #888; font-size: 13px; }
  .word-tooltip .tt-struct { color: #666; font-size: 12px; margin-top: 4px; }
  .btn-speak {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    background: rgba(124,111,247,0.15); border: 1px solid #7c6ff7;
    border-radius: 50%; cursor: pointer; font-size: 14px;
    transition: all 0.2s; color: #7c6ff7; flex-shrink: 0;
    vertical-align: middle; margin-left: 6px; padding: 0;

  .btn-speak:hover { background: #7c6ff7; color: #fff; }
  .btn-speak.speaking { background: #7c6ff7; color: #fff; animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  .btn-speak-lg {
    width: 40px; height: 40px; font-size: 18px;
    background: rgba(124,111,247,0.15); border: 1px solid #7c6ff7;
    border-radius: 50%; cursor: pointer;
    transition: all 0.2s; color: #7c6ff7;
    display: inline-flex; align-items: center; justify-content: center;
    margin-top: 8px;
  }
  .btn-speak-lg:hover { background: #7c6ff7; color: #fff; }
  .btn-speak-lg.speaking { background: #7c6ff7; color: #fff; animation: pulse 0.8s infinite; }
  .sentence-speak {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px;
    background: rgba(232,197,71,0.1); border: 1px solid rgba(232,197,71,0.4);
    border-radius: 50%; cursor: pointer; font-size: 13px;
    transition: all 0.2s; color: #e8c547; margin-right: 8px;
    vertical-align: middle; flex-shrink: 0; padding: 0;
  }
  .sentence-speak:hover { background: rgba(232,197,71,0.3); }
  .sentence-speak.speaking { animation: pulse 0.8s infinite; }

  /* Responsive */
  @media (max-width: 600px) {
    .vocab-item { grid-template-columns: 32px 1fr; }
    .similar-card { grid-template-columns: 1fr; text-align: center; }
    .similar-card .sim-vs { font-size: 14px; }
    .flashcard { padding: 24px; min-height: 240px; }
    .flashcard .fc-thai { font-size: 28px; }
    .thai-sentence { font-size: 17px; }
  }
</style>
</head>
<body>

<nav>
  <button class="active" onclick="switchTab('reading')">逐句閱讀</button>

<div class="container">

</div>

</div>

</div>

<div class="word-tooltip" id="tooltip"></div>

let speakAudio = null;
function speak(text, el) {
  const clean = text.replace(/\s{2,}/g, ' ').replace(/["""']/g, '').trim();
  if (!clean) return;

  // Stop any currently playing audio
  if (speakAudio) { speakAudio.pause(); speakAudio = null; }
  document.querySelectorAll('.speaking').forEach(e => e.classList.remove('speaking'));

  // Use Google Translate TTS
  const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(clean)}&tl=th&client=tw-ob&ttsspeed=0.5`;
  speakAudio = new Audio(url);
  if (el) {
    el.classList.add('speaking');
    speakAudio.onended = () => { el.classList.remove('speaking'); speakAudio = null; };
    speakAudio.onerror = () => {
      el.classList.remove('speaking');
      speakAudio = null;
      // Fallback to Web Speech API
      speakFallback(clean, el);
    };
  }
  speakAudio.play().catch(() => {
    // If Google TTS blocked, fallback
    if (el) el.classList.remove('speaking');
    speakFallback(clean, el);
  });
}

function speakFallback(text, el) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'th-TH';
  utter.rate = 0.8;
  const voices = window.speechSynthesis.getVoices();
  const thaiVoice = voices.find(v => v.lang.startsWith('th'));
  if (thaiVoice) utter.voice = thaiVoice;
  if (el) {
    el.classList.add('speaking');
    utter.onend = () => el.classList.remove('speaking');
    utter.onerror = () => el.classList.remove('speaking');
  }
  window.speechSynthesis.speak(utter);
}

// ===== RENDER =====
function renderReading() {
  const el = document.getElementById('tab-reading');
  let html = '<h1 style="font-size:26px;margin-bottom:8px;color:#fff;">แผนที่ที่ \'ซ่อน\' ลำดับชั้น</h1>';
  html += '<p style="color:#888;margin-bottom:24px;">隱藏階層的地圖 — 點擊單字查看詳情，點擊中文翻譯切換顯示/隱藏</p>';

  sections.forEach((sec, si) => {
    html += `<div class="section-title">${sec.title}</div>`;
    sec.sentences.forEach((sent, senti) => {
      const words = sent.thai.split(/\s{2,}/);
      const wordSpans = words.map(w => {
        const trimmed = w.replace(/["""']/g, '').trim();
        const sentMatch = sent.vocab.find(v => trimmed.includes(v.thai) || v.thai.includes(trimmed));
        const globalMatch = !sentMatch && allVocab.find(v => trimmed.includes(v.thai) || v.thai.includes(trimmed));
        const vocabMatch = sentMatch || globalMatch;
        if (vocabMatch) {
          const cls = globalMatch ? 'word word-review' : 'word';
          return `<span class="${cls}" data-thai="${vocabMatch.thai}" data-roman="${vocabMatch.roman}" data-zh="${vocabMatch.zh}" data-en="${vocabMatch.en}" data-struct="${vocabMatch.struct}">${w}</span>`;
        }
        return `<span class="word">${w}</span>`;
      }).join('  ');

      const sentText = sent.thai.replace(/\s{2,}/g, ' ');
      html += `<div class="sentence-card">
        <div class="thai-sentence"><button class="sentence-speak" onclick="event.stopPropagation();speak('${sentText.replace(/'/g,"\\'")}', this)" title="播放整句">&#9655;</button>${wordSpans}</div>
        <div class="zh-translation" onclick="this.classList.toggle('hidden')">
          <span>${sent.zh}</span><span class="hint">（點擊隱藏/顯示）</span>
        </div>
        <span class="vocab-toggle" onclick="toggleVocab(this)">▶ 展開單字 (${sent.vocab.length})</span>
        <div class="vocab-list collapsed">
          ${sent.vocab.map(v => `
            <div class="vocab-item" data-thai="${v.thai}" data-roman="${v.roman}" data-zh="${v.zh}" data-en="${v.en}" data-struct="${v.struct}">
              <div style="display:flex;align-items:center;justify-content:center;"><button class="btn-speak" onclick="event.stopPropagation();speak('${v.thai}', this)" title="播放發音">&#9835;</button></div>
              <div><span class="v-thai">${v.thai}</span><br><span class="v-roman">${v.roman}</span></div>
              <div><span class="v-meaning">${v.zh}</span><br><span class="v-english">${v.en}</span></div>
              <div class="v-struct">← ${v.struct}</div>
            </div>
          `).join('')}
        </div>
      </div>`;
    });
  });
  el.innerHTML = html;
}

function renderExamples() {
  const el = document.getElementById('tab-examples');
  let html = '<div class="section-title">常用例句</div><p style="color:#888;margin-bottom:16px;">點擊卡片展開例句</p>';
  examples.forEach(ex => {
    html += `<div class="example-card" onclick="this.classList.toggle('open')">
      <span class="ex-word">${ex.word}</span><button class="btn-speak" onclick="event.stopPropagation();speak('${ex.word}', this)" title="播放單字">&#9835;</button><span class="ex-zh">${ex.zh}</span>
      <div class="ex-sentences">
        <div class="ex-thai"><button class="sentence-speak" onclick="event.stopPropagation();speak('${ex.thai_ex.replace(/\s{2,}/g,' ').replace(/'/g,"\\'")}', this)" title="播放例句">&#9655;</button>${ex.thai_ex}</div>
        <div class="ex-cn">${ex.zh_ex}</div>
      </div>
    </div>`;
  });

}

function renderSimilar() {
  const el = document.getElementById('tab-similar');
  let html = '<div class="section-title">近似字整理</div>';
  similarWords.forEach(s => {
    html += `<div class="similar-card">
      <div class="sim-word"><div class="sim-thai">${s.w1}<button class="btn-speak" onclick="speak('${s.w1}', this)" title="播放" style="margin-left:6px;">&#9835;</button></div><div class="sim-roman">${s.r1}</div><div class="sim-mean">${s.m1}</div></div>
      <div class="sim-vs">VS</div>
      <div class="sim-word"><div class="sim-thai">${s.w2}<button class="btn-speak" onclick="speak('${s.w2}', this)" title="播放" style="margin-left:6px;">&#9835;</button></div><div class="sim-roman">${s.r2}</div><div class="sim-mean">${s.m2}</div></div>
      <div class="sim-note">${s.note}</div>
    </div>`;

}

// ===== FLASHCARD =====
let fcIndex = 0;
let fcList = [...allVocab];

function renderFlashcard() {
  const card = document.getElementById('flashcard');
  card.classList.remove('revealed');
  const v = fcList[fcIndex];
  card.querySelector('.fc-thai').textContent = v.thai;
  card.querySelector('.fc-roman').textContent = v.roman;
  card.querySelector('.fc-zh').textContent = v.zh;
  card.querySelector('.fc-en').textContent = v.en;
  card.querySelector('.fc-struct').textContent = '← ' + v.struct;
  document.getElementById('fc-progress').textContent = `${fcIndex + 1} / ${fcList.length}`;
}
function revealCard() { document.getElementById('flashcard').classList.add('revealed'); }
function nextCard() { fcIndex = (fcIndex + 1) % fcList.length; renderFlashcard(); }
function prevCard() { fcIndex = (fcIndex - 1 + fcList.length) % fcList.length; renderFlashcard(); }
function shuffleCards() {
  for (let i = fcList.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fcList[i], fcList[j]] = [fcList[j], fcList[i]];
  }
  fcIndex = 0; renderFlashcard();
}

// ===== QUIZ =====
let quizIndex = 0;
let quizScore = 0;
let quizTotal = 0;
let quizList = [];
let quizAnswered = false;

function initQuiz() {
  quizList = [...allVocab].sort(() => Math.random() - 0.5);
  quizIndex = 0; quizScore = 0; quizTotal = 0; quizAnswered = false;
  renderQuiz();
}

function renderQuiz() {
  const area = document.getElementById('quiz-area');
  if (quizIndex >= quizList.length) {
    area.innerHTML = `<div style="text-align:center;padding:60px 0;">
      <div style="font-size:48px;margin-bottom:16px;">🎉</div>
      <div style="font-size:24px;color:#fff;">測驗完成！</div>
      <div style="font-size:18px;color:#7c6ff7;margin-top:12px;">${quizScore} / ${quizTotal} 正確 (${Math.round(quizScore/quizTotal*100)}%)</div>
      <button class="quiz-next" onclick="initQuiz()" style="margin-top:24px;">重新開始</button>
    </div>`;
    return;
  }
  const current = quizList[quizIndex];
  // Generate 3 wrong options
  const wrongs = allVocab.filter(v => v.thai !== current.thai).sort(() => Math.random() - 0.5).slice(0, 3);
  const options = [current, ...wrongs].sort(() => Math.random() - 0.5);

  area.innerHTML = `
    <div class="quiz-score">得分：${quizScore} / ${quizTotal}</div>
    <div class="quiz-question">${current.thai}<button class="btn-speak" onclick="speak('${current.thai}', this)" title="播放" style="margin-left:10px;vertical-align:middle;">&#9835;</button></div>
    <div class="quiz-roman">${current.roman}</div>
    <div class="quiz-options">
      ${options.map(o => `<div class="quiz-option" data-correct="${o.thai === current.thai}" onclick="answerQuiz(this, '${o.thai === current.thai}')">${o.zh} (${o.en})</div>`).join('')}
    </div>
    <button class="quiz-next" id="quiz-next-btn" style="display:none;" onclick="nextQuiz()">下一題 →</button>
  `;
  quizAnswered = false;
}

function answerQuiz(el, isCorrect) {
  if (quizAnswered) return;
  quizAnswered = true;
  quizTotal++;
  if (isCorrect === 'true') {
    el.classList.add('correct');
    quizScore++;
  } else {
    el.classList.add('wrong');
    document.querySelectorAll('.quiz-option').forEach(o => {
      if (o.dataset.correct === 'true') o.classList.add('correct');
    });
  }
  document.getElementById('quiz-next-btn').style.display = 'block';
}

function nextQuiz() { quizIndex++; renderQuiz(); }

// ===== TABS =====
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'flashcard') renderFlashcard();
  if (name === 'quiz') initQuiz();
}

// ===== VOCAB TOGGLE =====
function toggleVocab(el) {
  const list = el.nextElementSibling;
  list.classList.toggle('collapsed');
  el.textContent = list.classList.contains('collapsed')
    ? `▶ 展開單字 (${list.children.length})`
    : `▼ 收起單字`;
}

// ===== TOOLTIP =====
const tooltip = document.getElementById('tooltip');
document.addEventListener('mouseover', e => {
  const word = e.target.closest('.word[data-thai]');
  if (!word) return;
  tooltip.innerHTML = `
    <div class="tt-thai">${word.dataset.thai}</div>
    <div class="tt-roman">${word.dataset.roman}</div>
    <div class="tt-zh">${word.dataset.zh}</div>
    <div class="tt-en">${word.dataset.en}</div>
    <div class="tt-struct">← ${word.dataset.struct}</div>
  `;
  tooltip.style.display = 'block';
  const r = word.getBoundingClientRect();
  let left = r.left;
  let top = r.bottom + 8;
  if (left + 240 > window.innerWidth) left = window.innerWidth - 250;
  if (top + 150 > window.innerHeight) top = r.top - 150;
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
  word.classList.add('highlighted');
});
document.addEventListener('mouseout', e => {
  const word = e.target.closest('.word');
  if (word) word.classList.remove('highlighted');
  if (!e.relatedTarget || !e.relatedTarget.closest('.word-tooltip')) {
    tooltip.style.display = 'none';
  }
});
tooltip.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
document.addEventListener('click', e => {
  const word = e.target.closest('.word');
  if (!word) return;
  const text = word.dataset.thai || word.textContent.replace(/\s+/g, '').trim();
  if (text) speak(text, word);
});

// ===== INIT =====
renderReading();
renderExamples();
renderSimilar();
renderFlashcard();
</script>
